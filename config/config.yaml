kafka:
  bootstrap_servers: "localhost:29092"
  topics:
    traffic: "traffic-stream"
    weather: "weather-stream"
    prediction: "prediction-stream"
    dlq: "dead-letter-stream"
  producer:
    acks: "all"
    retries: 5
    retry_backoff_ms: 1000
    linger_ms: 10
    compression_type: "gzip"
  consumer:
    group_id: "smartcity-group"
    auto_offset_reset: "earliest"
    enable_auto_commit: false
    max_poll_records: 100

spark:
  master: "local[*]"
  app_name: "SmartCityPlatform"
  streaming_interval: 5
  checkpoint_dir: "./spark/checkpoints"
  log_level: "INFO"
  executor_memory: "512M"
  driver_memory: "512M"

postgres:
  host: "localhost"
  port: 5432
  db: "smartcity"
  user: "postgres"
  password: "postgres"
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30

hdfs:
  namenode: "localhost"
  port: 9870
  user: "hadoop"
  base_path: "/smartcity"
  replication: 1
  block_size: 134217728

data:
  raw_dir: "./data/raw"
  processed_dir: "./data/processed"
  sample_dir: "./data/sample"
  parquet_compression: "SNAPPY"

ml:
  model_dir: "./ml/models"
  test_size: 0.2
  random_state: 42
  cv_folds: 5
  algorithms:
    - "random_forest"
    - "gradient_boosting"
    - "linear_regression"
    - "xgboost"

dashboard:
  title: "🚦 SmartFlow - Smart City Traffic Platform"
  port: 8501
  theme: "dark"
  refresh_interval: 15

